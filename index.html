<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F5F0; --surface: #FFFFFF; --surface2: #F0EDE6;
  --border: #E2DDD5; --border-strong: #C8C2B8;
  --text: #1A1714; --text-muted: #7A7168; --text-light: #B0A898;
  --accent: #2D5A3D; --accent-light: #E8F0EB; --accent-mid: #4A8A5E;
  --radius: 10px; --radius-lg: 16px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }
header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; gap: 12px; }
.logo { font-family: 'DM Serif Display', serif; font-size: 20px; color: var(--text); display: flex; align-items: center; gap: 10px; white-space: nowrap; }
.logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
.header-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.badge-saved { font-size: 12px; color: var(--text-light); display: flex; align-items: center; gap: 5px; white-space: nowrap; transition: color 0.3s; }
.badge-saved::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent-mid); display: inline-block; }
.lang-select { font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); cursor: pointer; outline: none; }
.lang-select:focus { border-color: var(--accent); }
.btn { display: inline-flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: var(--radius); font-size: 13px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid var(--border); background: var(--surface); color: var(--text); white-space: nowrap; }
.btn:hover { background: var(--surface2); border-color: var(--border-strong); }
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn-primary:hover { background: #234830; border-color: #234830; }
.btn svg { width: 15px; height: 15px; flex-shrink: 0; }
.container { max-width: 760px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }
.form-meta { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: var(--shadow); }
.form-title-input { font-family: 'DM Serif Display', serif; font-size: 26px; color: var(--text); border: none; outline: none; background: transparent; width: 100%; letter-spacing: -0.3px; }
.form-title-input::placeholder { color: var(--text-light); }
.form-subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.date-input { font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-muted); border: none; outline: none; background: transparent; cursor: pointer; }
.sep { color: var(--border-strong); }
.progress-wrap { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.progress-track { height: 4px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.3s ease; }
.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 1rem; box-shadow: var(--shadow); overflow: hidden; }
.section-head { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.section-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--accent); }
.section-icon svg { width: 15px; height: 15px; }
.section-title-input { font-weight: 600; font-size: 14px; flex: 1; border: none; outline: none; background: transparent; font-family: 'DM Sans', sans-serif; color: var(--text); min-width: 0; }
.section-count { font-size: 12px; color: var(--text-muted); background: var(--surface2); padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--text-light); padding: 4px; display: flex; align-items: center; transition: color 0.15s; }
.icon-btn:hover { color: var(--text-muted); }
.icon-btn svg { width: 14px; height: 14px; }
.item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 1.25rem; border-bottom: 1px solid var(--border); transition: background 0.1s; }
.item:last-child { border-bottom: none; }
.item:hover { background: #FDFCFA; }
.checkbox { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid var(--border-strong); flex-shrink: 0; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: var(--surface); }
.checkbox:hover { border-color: var(--accent); }
.checkbox.checked { background: var(--accent); border-color: var(--accent); }
.checkbox svg { display: none; width: 11px; height: 11px; color: white; }
.checkbox.checked svg { display: block; }
.item-body { flex: 1; min-width: 0; }
.item-label-input { font-size: 14px; border: none; outline: none; background: transparent; font-family: 'DM Sans', sans-serif; color: var(--text); width: 100%; }
.item-label-input.done { color: var(--text-light); text-decoration: line-through; text-decoration-color: var(--border-strong); }
.field-wrap { margin-top: 8px; }
textarea.field, input[type=text].field { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; outline: none; transition: border-color 0.15s; resize: vertical; }
textarea.field:focus, input[type=text].field:focus { border-color: var(--accent); background: var(--surface); }
textarea.field { min-height: 64px; }
.radio-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.radio-opt { padding: 4px 12px; border-radius: 99px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; color: var(--text-muted); transition: all 0.15s; background: var(--surface); font-family: 'DM Sans', sans-serif; }
.radio-opt:hover { border-color: var(--accent); color: var(--accent); }
.radio-opt.active { background: var(--accent); color: white; border-color: var(--accent); }
/* PHOTOS */
.photo-section { margin-top: 10px; }
.photo-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.photo-thumb { position: relative; width: 76px; height: 76px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); flex-shrink: 0; }
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: pointer; }
.photo-del { position: absolute; top: 3px; right: 3px; background: rgba(0,0,0,0.6); border: none; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; padding: 0; }
.photo-del svg { width: 10px; height: 10px; }
.photo-add-label { width: 76px; height: 76px; border-radius: var(--radius); border: 1.5px dashed var(--border-strong); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; color: var(--text-muted); font-size: 11px; background: var(--bg); transition: all 0.15s; flex-shrink: 0; }
.photo-add-label:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.photo-add-label svg { width: 20px; height: 20px; }
.photo-count { font-size: 11px; color: var(--text-light); margin-top: 4px; }
/* LIGHTBOX */
.lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 300; align-items: center; justify-content: center; }
.lightbox.open { display: flex; }
.lightbox img { max-width: 90vw; max-height: 90vh; border-radius: var(--radius); object-fit: contain; }
.lightbox-close { position: fixed; top: 20px; right: 24px; background: none; border: none; color: white; font-size: 32px; cursor: pointer; line-height: 1; }
/* ADD ROW */
.add-row { display: flex; align-items: center; gap: 12px; padding: 10px 1.25rem; border-top: 1px dashed var(--border); flex-wrap: wrap; }
.add-btn { font-size: 13px; color: var(--text-muted); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; gap: 5px; padding: 4px 0; transition: color 0.15s; }
.add-btn:hover { color: var(--accent); }
.add-btn svg { width: 14px; height: 14px; }
.add-section-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border: 1.5px dashed var(--border-strong); border-radius: var(--radius-lg); background: transparent; color: var(--text-muted); font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.15s; margin-bottom: 1rem; }
.add-section-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
/* MODAL */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
.overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: var(--radius-lg); padding: 1.5rem; width: 100%; max-width: 440px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal h2 { font-family: 'DM Serif Display', serif; font-size: 20px; margin-bottom: 1rem; }
.modal-field { margin-bottom: 1rem; }
.modal-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; display: block; }
.modal-input { width: 100%; font-family: 'DM Sans', sans-serif; font-size: 14px; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; }
.modal-input:focus { border-color: var(--accent); background: var(--surface); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }
@media (max-width: 600px) {
  header { padding: 0 1rem; }
  .container { padding: 1rem 0.75rem 5rem; }
  .logo { font-size: 16px; }
  .btn .btn-label { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>Checklist</div>
  <div class="header-right">
    <div class="badge-saved" id="save-badge"><span id="t-saved">Opgeslagen</span></div>
    <select class="lang-select" id="lang-select" onchange="changeLang(this.value)" title="Language">
      <option value="nl">🇧🇪 Nederlands</option>
      <option value="en">🇬🇧 English</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="de">🇩🇪 Deutsch</option>
    </select>
    <button class="btn btn-primary" onclick="openPdfModal()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span class="btn-label" id="t-export">Exporteer PDF</span>
    </button>
  </div>
</header>

<div class="container">
  <div class="form-meta">
    <input class="form-title-input" id="form-title" type="text" title="Checklist title" placeholder="Checklist title" oninput="saveData()">
    <div class="form-subtitle">
      <span style="display:flex;align-items:center;gap:4px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <input class="date-input" type="date" id="form-date" oninput="saveData()" title="Datum" aria-label="Datum" placeholder="Datum">
      </span>
      <span class="sep">·</span>
      <span id="meta-count"></span>
    </div>
    <div class="progress-wrap">
      <div class="progress-info"><span id="t-progress">Voortgang</span><span id="progress-pct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
  </div>
  <div id="sections-wrap"></div>
  <button class="add-section-btn" onclick="addSection()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span id="t-addsection">Nieuwe sectie toevoegen</span>
  </button>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- PDF Modal -->
<div class="overlay" id="pdf-overlay">
  <div class="modal">
    <h2 id="t-pdfmodal-title">Exporteer als PDF</h2>
    <div class="modal-field">
      <label class="modal-label" id="t-pdfauthor">Opgesteld door</label>
      <input class="modal-input" id="pdf-author" type="text">
    </div>
    <div class="modal-field">
      <label class="modal-label" id="t-pdforg">Organisatie</label>
      <input class="modal-input" id="pdf-org" type="text">
    </div>
    <div class="modal-field">
      <label class="modal-label" id="t-pdfnotes">Opmerkingen</label>
      <input class="modal-input" id="pdf-notes" type="text">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closePdfModal()" id="t-cancel">Annuleer</button>
      <button class="btn btn-primary" onclick="generatePDF()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span id="t-download">Download PDF</span>
      </button>
    </div>
  </div>
</div>

<script>
// ── TRANSLATIONS ──
const TR = {
  nl: { saved:'Opgeslagen', export:'Exporteer PDF', progress:'Voortgang', addsection:'Nieuwe sectie toevoegen', newsection:'Nieuwe sectie', newitem:'Nieuw punt', addcheck:'Vinkpunt', addtext:'Tekstveld', addradio:'Keuze', addphoto:'Foto', delconfirm:'Sectie verwijderen?', pdfmodal:'Exporteer als PDF', pdfauthor:'Opgesteld door', pdforg:'Organisatie', pdfnotes:'Opmerkingen', cancel:'Annuleer', download:'Download PDF', radiooptions:'Opties (komma gescheiden)', phototext:'Foto toevoegen', checkedof:'van', itemschecked:'aangevinkt', preparedby:'Opgesteld door', org:'Organisatie', note:'Opmerking', generatedOn:'Gegenereerd op', page:'Pagina', titlePH:'Naam van de checklist…', authorPH:'Naam inspecteur…', orgPH:'Bedrijfsnaam…', notesPH:'Optionele opmerking…', textPH:'Typ hier…', photos:'foto\'s' },
  en: { saved:'Saved', export:'Export PDF', progress:'Progress', addsection:'Add new section', newsection:'New section', newitem:'New item', addcheck:'Checkbox', addtext:'Text field', addradio:'Choice', addphoto:'Photo', delconfirm:'Delete section?', pdfmodal:'Export as PDF', pdfauthor:'Prepared by', pdforg:'Organisation', pdfnotes:'Notes', cancel:'Cancel', download:'Download PDF', radiooptions:'Options (comma separated)', phototext:'Add photo', checkedof:'of', itemschecked:'checked', preparedby:'Prepared by', org:'Organisation', note:'Note', generatedOn:'Generated on', page:'Page', titlePH:'Checklist name…', authorPH:'Inspector name…', orgPH:'Company name…', notesPH:'Optional note…', textPH:'Type here…', photos:'photos' },
  fr: { saved:'Sauvegardé', export:'Exporter PDF', progress:'Progression', addsection:'Ajouter une section', newsection:'Nouvelle section', newitem:'Nouvel élément', addcheck:'Case à cocher', addtext:'Champ texte', addradio:'Choix', addphoto:'Photo', delconfirm:'Supprimer la section ?', pdfmodal:'Exporter en PDF', pdfauthor:'Préparé par', pdforg:'Organisation', pdfnotes:'Remarques', cancel:'Annuler', download:'Télécharger PDF', radiooptions:'Options (séparées par virgule)', phototext:'Ajouter photo', checkedof:'sur', itemschecked:'cochés', preparedby:'Préparé par', org:'Organisation', note:'Remarque', generatedOn:'Généré le', page:'Page', titlePH:'Nom de la liste de contrôle…', authorPH:'Nom de l\'inspecteur…', orgPH:'Nom de l\'entreprise…', notesPH:'Remarque optionnelle…', textPH:'Tapez ici…', photos:'photos' },
  de: { saved:'Gespeichert', export:'PDF Exportieren', progress:'Fortschritt', addsection:'Abschnitt hinzufügen', newsection:'Neuer Abschnitt', newitem:'Neuer Punkt', addcheck:'Kontrollkästchen', addtext:'Textfeld', addradio:'Auswahl', addphoto:'Foto', delconfirm:'Abschnitt löschen?', pdfmodal:'Als PDF exportieren', pdfauthor:'Erstellt von', pdforg:'Organisation', pdfnotes:'Anmerkungen', cancel:'Abbrechen', download:'PDF herunterladen', radiooptions:'Optionen (kommagetrennt)', phototext:'Foto hinzufügen', checkedof:'von', itemschecked:'abgehakt', preparedby:'Erstellt von', org:'Organisation', note:'Anmerkung', generatedOn:'Erstellt am', page:'Seite', titlePH:'Name der Checkliste…', authorPH:'Name des Inspektors…', orgPH:'Firmenname…', notesPH:'Optionelle Anmerkung…', textPH:'Hier eingeben…', photos:'Fotos' }
};

let lang = 'nl';
const t = k => (TR[lang]||TR.nl)[k] || k;

function changeLang(l) { lang=l; data.lang=l; saveData(); applyTR(); render(); }

function applyTR() {
  const ids = { 't-saved':'saved','t-export':'export','t-progress':'progress','t-addsection':'addsection','t-pdfmodal-title':'pdfmodal','t-pdfauthor':'pdfauthor','t-pdforg':'pdforg','t-pdfnotes':'pdfnotes','t-cancel':'cancel','t-download':'download' };
  for (const [id,key] of Object.entries(ids)) { const el=document.getElementById(id); if(el) el.textContent=t(key); }
  const fi=document.getElementById('form-title'); if(fi) fi.placeholder=t('titlePH');
  const pa=document.getElementById('pdf-author'); if(pa) pa.placeholder=t('authorPH');
  const po=document.getElementById('pdf-org'); if(po) po.placeholder=t('orgPH');
  const pn=document.getElementById('pdf-notes'); if(pn) pn.placeholder=t('notesPH');
  updateProgress();
}

// ── DATA ──
let data = {
  lang:'nl', title:'Inspectie Q2 2025', date:'',
  sections:[
    { id:'s1', title:'Sectie A — Algemeen', items:[
      { id:'i1', label:'Locatie geïnspecteerd', hint:'Verplicht punt', checked:true, type:'check', photos:[] },
      { id:'i2', label:'Verantwoordelijke aanwezig', hint:'', checked:false, type:'check', photos:[] },
      { id:'i3', label:'Bijkomende opmerkingen', hint:'', checked:false, type:'text', value:'', photos:[] }
    ]},
    { id:'s2', title:'Sectie B — Veiligheid', items:[
      { id:'i4', label:'Nooduitgangen vrij', hint:'', checked:false, type:'check', photos:[] },
      { id:'i5', label:'Brandblussers gecontroleerd', hint:'Vervaldatum controleren', checked:false, type:'check', photos:[] },
      { id:'i6', label:'Risicobeoordeling', hint:'', checked:false, type:'radio', options:['Laag','Medium','Hoog'], value:'', photos:[] }
    ]},
    { id:'s3', title:'Sectie C — Afsluiting', items:[
      { id:'i7', label:'Rapport ondertekend', hint:'', checked:false, type:'check', photos:[] },
      { id:'i8', label:'Verzonden naar verantwoordelijke', hint:'', checked:false, type:'check', photos:[] }
    ]}
  ]
};

let saveTimer=null, idN=200;
const uid = () => 'x'+(++idN)+Date.now();

function loadData() {
  const raw=localStorage.getItem('checklist_v2');
  if(raw){try{data=JSON.parse(raw);}catch(e){}}
  data.sections.forEach(s=>s.items.forEach(i=>{if(!i.photos)i.photos=[];}));
  document.getElementById('form-title').value=data.title||'';
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('form-date').value=data.date||today;
  if(!data.date) data.date=today;
  if(data.lang){lang=data.lang;document.getElementById('lang-select').value=data.lang;}
}

function saveData() {
  data.title=document.getElementById('form-title').value;
  data.date=document.getElementById('form-date').value;
  localStorage.setItem('checklist_v2',JSON.stringify(data));
  const b=document.getElementById('save-badge');
  b.style.color='var(--accent)';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{b.style.color='';},1500);
  updateProgress();
}

// ── SVG ICONS ──
const IC = {
  check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`,
  tick:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`,
  plus:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  trash: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>`,
  x:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  cam:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`
};

// ── RENDER ──
function render() {
  const wrap=document.getElementById('sections-wrap');
  wrap.innerHTML='';
  data.sections.forEach(sec=>wrap.appendChild(renderSection(sec)));
  updateProgress();
}

function renderSection(sec) {
  const el=document.createElement('div');
  el.className='section';
  const done=sec.items.filter(i=>i.checked).length;
  el.innerHTML=`
    <div class="section-head">
      <div class="section-icon">${IC.check}</div>
      <input class="section-title-input" value="${esc(sec.title)}" placeholder="${t('newsection')}" oninput="updSecTitle('${sec.id}',this.value)">
      <span class="section-count">${done}/${sec.items.length}</span>
      <button class="icon-btn" onclick="delSection('${sec.id}')">${IC.trash}</button>
    </div>
    <div id="iw-${sec.id}"></div>
    <div class="add-row">
      <button class="add-btn" onclick="addItem('${sec.id}','check')">${IC.plus} ${t('addcheck')}</button>
      <button class="add-btn" onclick="addItem('${sec.id}','text')">${IC.plus} ${t('addtext')}</button>
      <button class="add-btn" onclick="addItem('${sec.id}','radio')">${IC.plus} ${t('addradio')}</button>
    </div>`;
  const iw=el.querySelector(`#iw-${sec.id}`);
  sec.items.forEach(item=>iw.appendChild(renderItem(sec.id,item)));
  return el;
}

function renderItem(sid, item) {
  const el=document.createElement('div');
  el.className='item';

  let field='';
  if(item.type==='text'){
    field=`<div class="field-wrap"><textarea class="field" placeholder="${t('textPH')}" oninput="updVal('${sid}','${item.id}',this.value)">${esc(item.value||'')}</textarea></div>`;
  } else if(item.type==='radio'){
    const opts=(item.options||['Ja','Nee','N/A']).map(o=>
      `<div class="radio-opt${item.value===o?' active':''}" onclick="selRadio('${sid}','${item.id}','${esc(o)}')">${esc(o)}</div>`
    ).join('');
    field=`<div class="radio-row">${opts}</div>
    <div style="margin-top:6px"><input type="text" class="field" placeholder="${t('radiooptions')}" value="${esc((item.options||[]).join(', '))}" onchange="updRadioOpts('${sid}','${item.id}',this.value)" style="font-size:12px"></div>`;
  }

  const thumbs=(item.photos||[]).map((p,pi)=>
    `<div class="photo-thumb">
      <img src="${p.data}" alt="foto ${pi+1}" onclick="openLightbox('${p.data}')">
      <button class="photo-del" onclick="delPhoto('${sid}','${item.id}',${pi})">${IC.x}</button>
    </div>`
  ).join('');

  const photoCount=(item.photos||[]).length;

  el.innerHTML=`
    <div class="checkbox${item.checked?' checked':''}" onclick="togCheck('${sid}','${item.id}')">${IC.tick}</div>
    <div class="item-body">
      <input class="item-label-input${item.checked?' done':''}" value="${esc(item.label)}" placeholder="${t('newitem')}" oninput="updLabel('${sid}','${item.id}',this.value)">
      ${item.hint?`<div style="font-size:12px;color:var(--text-light);margin-top:2px">${esc(item.hint)}</div>`:''}
      ${field}
      <div class="photo-section">
        <div class="photo-grid">
          ${thumbs}
          <label class="photo-add-label">
            ${IC.cam}
            <span style="font-size:11px">${t('addphoto')}</span>
            <input type="file" accept="image/*" multiple style="display:none" onchange="handlePhotos('${sid}','${item.id}',this)">
          </label>
        </div>
        ${photoCount>0?`<div class="photo-count">${photoCount} ${t('photos')}</div>`:''}
      </div>
    </div>
    <button class="icon-btn" onclick="delItem('${sid}','${item.id}')">${IC.x}</button>`;
  return el;
}

// ── PHOTO ACTIONS ──
function handlePhotos(sid,iid,input) {
  const files=Array.from(input.files); if(!files.length) return;
  let n=0;
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      const item=getItem(sid,iid);
      if(item){ if(!item.photos) item.photos=[]; item.photos.push({data:e.target.result,name:f.name}); }
      if(++n===files.length){saveData();render();}
    };
    r.readAsDataURL(f);
  });
}
function delPhoto(sid,iid,pi){const i=getItem(sid,iid);if(i&&i.photos){i.photos.splice(pi,1);saveData();render();}}
function openLightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}

// ── ITEM ACTIONS ──
function togCheck(sid,iid){const i=getItem(sid,iid);if(i){i.checked=!i.checked;saveData();render();}}
function updLabel(sid,iid,v){const i=getItem(sid,iid);if(i){i.label=v;saveData();}}
function updVal(sid,iid,v){const i=getItem(sid,iid);if(i){i.value=v;saveData();}}
function selRadio(sid,iid,v){const i=getItem(sid,iid);if(i){i.value=v;i.checked=true;saveData();render();}}
function updRadioOpts(sid,iid,v){const i=getItem(sid,iid);if(i){i.options=v.split(',').map(s=>s.trim()).filter(Boolean);saveData();render();}}
function updSecTitle(sid,v){const s=data.sections.find(s=>s.id===sid);if(s){s.title=v;saveData();}}
function addSection(){data.sections.push({id:uid(),title:t('newsection'),items:[{id:uid(),label:t('newitem'),hint:'',checked:false,type:'check',photos:[]}]});saveData();render();}
function delSection(sid){if(!confirm(t('delconfirm')))return;data.sections=data.sections.filter(s=>s.id!==sid);saveData();render();}
function addItem(sid,type){const sec=data.sections.find(s=>s.id===sid);if(!sec)return;const ni={id:uid(),label:t('newitem'),hint:'',checked:false,type,photos:[]};if(type==='radio')ni.options=['Ja','Nee','N/A'];if(type==='text'||type==='radio')ni.value='';sec.items.push(ni);saveData();render();}
function delItem(sid,iid){const sec=data.sections.find(s=>s.id===sid);if(!sec)return;sec.items=sec.items.filter(i=>i.id!==iid);saveData();render();}
function getItem(sid,iid){const s=data.sections.find(s=>s.id===sid);return s?s.items.find(i=>i.id===iid):null;}

// ── PROGRESS ──
function updateProgress(){
  let total=0,done=0;
  data.sections.forEach(s=>s.items.forEach(i=>{total++;if(i.checked)done++;}));
  const pct=total?Math.round((done/total)*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
  document.getElementById('meta-count').textContent=`${done} ${t('checkedof')} ${total} ${t('itemschecked')}`;
}

// ── PDF ──
function openPdfModal(){document.getElementById('pdf-overlay').classList.add('open');}
function closePdfModal(){document.getElementById('pdf-overlay').classList.remove('open');}

async function generatePDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const pw=210,ph=297,mg=18,cw=pw-mg*2;
  let y=mg;
  const G=[45,90,61],D=[26,23,20],M=[120,113,104],L=[240,237,230],W=[255,255,255];

  const author=document.getElementById('pdf-author').value;
  const org=document.getElementById('pdf-org').value;
  const notes=document.getElementById('pdf-notes').value;
  const locale=lang==='nl'?'nl-BE':lang==='fr'?'fr-FR':lang==='de'?'de-DE':'en-GB';
  const dateStr=data.date?new Date(data.date).toLocaleDateString(locale,{day:'2-digit',month:'long',year:'numeric'}):'';

  // Header
  doc.setFillColor(...G);doc.rect(0,0,pw,22,'F');
  doc.setTextColor(...W);doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text(data.title||'Checklist',mg,14);
  doc.setFontSize(9);doc.setFont('helvetica','normal');
  let hr=dateStr; if(org) hr=org+(dateStr?'  ·  '+dateStr:'');
  doc.text(hr,pw-mg,14,{align:'right'});
  y=30;

  if(author||notes){
    doc.setFontSize(9);doc.setTextColor(...M);
    if(author){doc.text(t('preparedby')+': '+author,mg,y);y+=5;}
    if(notes){doc.text(t('note')+': '+notes,mg,y);y+=5;}
    y+=2;
  }

  let total=0,done=0;
  data.sections.forEach(s=>s.items.forEach(i=>{total++;if(i.checked)done++;}));
  const pct=total?Math.round((done/total)*100):0;
  doc.setFontSize(9);doc.setTextColor(...M);
  doc.text(`${t('progress')}: ${done}/${total} (${pct}%)`,mg,y);y+=4;
  doc.setFillColor(...L);doc.roundedRect(mg,y,cw,3,1.5,1.5,'F');
  doc.setFillColor(...G);if(pct>0)doc.roundedRect(mg,y,cw*pct/100,3,1.5,1.5,'F');
  y+=9;

  for(const sec of data.sections){
    if(y>ph-30){doc.addPage();y=mg;}
    doc.setFillColor(...L);doc.roundedRect(mg,y,cw,8,2,2,'F');
    doc.setTextColor(...G);doc.setFontSize(10);doc.setFont('helvetica','bold');
    doc.text(sec.title,mg+4,y+5.5);
    const sd=sec.items.filter(i=>i.checked).length;
    doc.setTextColor(...M);doc.setFontSize(8);doc.setFont('helvetica','normal');
    doc.text(`${sd}/${sec.items.length}`,pw-mg-2,y+5.5,{align:'right'});
    y+=12;

    for(const item of sec.items){
      if(y>ph-20){doc.addPage();y=mg;}
      // Checkbox
      doc.setLineWidth(0.4);
      if(item.checked){
        doc.setFillColor(...G);doc.roundedRect(mg,y-3.5,5,5,1,1,'F');
        doc.setDrawColor(...W);doc.setLineWidth(0.8);
        doc.line(mg+1,y-0.8,mg+2.2,y+0.6);doc.line(mg+2.2,y+0.6,mg+4,y-1.8);
      } else {
        doc.setFillColor(...W);doc.setDrawColor(180,174,166);doc.roundedRect(mg,y-3.5,5,5,1,1,'FD');
      }
      // Label
      doc.setTextColor(item.checked?160:D[0],item.checked?155:D[1],item.checked?148:D[2]);
      doc.setFontSize(10);doc.setFont('helvetica','normal');
      const ll=doc.splitTextToSize(item.label,cw-14);
      doc.text(ll,mg+8,y);
      if(item.checked){
        doc.setDrawColor(180,174,166);doc.setLineWidth(0.3);
        ll.forEach((l,li)=>{const tw=doc.getTextWidth(l);doc.line(mg+8,y+li*4.5-0.5,mg+8+tw,y+li*4.5-0.5);});
      }
      y+=ll.length*4.5;
      if(item.type==='text'&&item.value){
        doc.setFontSize(9);doc.setTextColor(...M);
        const vl=doc.splitTextToSize('→ '+item.value,cw-14);
        vl.forEach(l=>{if(y>ph-15){doc.addPage();y=mg;}doc.text(l,mg+8,y);y+=4.2;});
      }
      if(item.type==='radio'&&item.value){
        doc.setFontSize(9);doc.setTextColor(...M);
        doc.text('→ '+item.value,mg+8,y);y+=4.2;
      }
      // Photos in PDF
      if(item.photos&&item.photos.length>0){
        const pw2=42,ph2=32,gap=4;
        let px=mg+8;
        if(y+ph2>ph-15){doc.addPage();y=mg;px=mg+8;}
        for(let pi=0;pi<item.photos.length;pi++){
          if(px+pw2>pw-mg){px=mg+8;y+=ph2+gap;if(y+ph2>ph-15){doc.addPage();y=mg;px=mg+8;}}
          try{doc.addImage(item.photos[pi].data,'JPEG',px,y,pw2,ph2,'','MEDIUM');}catch(e){}
          doc.setDrawColor(...L);doc.setLineWidth(0.3);doc.rect(px,y,pw2,ph2);
          px+=pw2+gap;
        }
        y+=ph2+gap+2;
      }
      y+=2;
    }
    y+=4;
  }

  // Footers
  const pc=doc.internal.getNumberOfPages();
  const gd=new Date().toLocaleDateString(locale);
  for(let i=1;i<=pc;i++){
    doc.setPage(i);
    doc.setFillColor(...L);doc.rect(0,ph-10,pw,10,'F');
    doc.setTextColor(...M);doc.setFontSize(8);doc.setFont('helvetica','normal');
    doc.text(t('generatedOn')+' '+gd,mg,ph-4);
    doc.text(t('page')+' '+i+' / '+pc,pw-mg,ph-4,{align:'right'});
  }

  const fname=(data.title||'checklist').replace(/\s+/g,'_').toLowerCase()+'.pdf';
  doc.save(fname);
  closePdfModal();
}

// ── UTILS ──
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── INIT ──
loadData();
applyTR();
render();
if(!document.getElementById('form-date').value)
  document.getElementById('form-date').value=new Date().toISOString().split('T')[0];
</script>
</body>
